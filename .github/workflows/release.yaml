jobs:
  nix:
    secrets:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
      OPERATOR_PRIVATE_KEY: ${{ secrets.OPERATOR_PRIVATE_KEY }}
    uses: ./.github/workflows/nix.yaml
    with:
      cachix-name: shikanime-studio
  release-branch:
    if: (startsWith(github.ref, 'refs/tags/v') && endsWith(github.ref_name, '.0')) || (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.ref_name, 'v') && endsWith(github.event.inputs.ref_name, '.0'))
    needs:
      - nix
    permissions:
      contents: write
    runs-on: ubuntu-slim
    steps:
      - continue-on-error: true
        id: createGithubAppToken
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.OPERATOR_APP_CLIENT_ID }}
          permission-contents: write
          private-key: ${{ secrets.OPERATOR_PRIVATE_KEY }}
      - uses: shikanime-studio/actions/checkout@v9
        with:
          github-token: ${{ steps.createGithubAppToken.outputs.token || secrets.GITHUB_TOKEN }}
      - env:
          REF_NAME: ${{ github.ref_name || github.event.inputs.ref_name }}
        run: git push origin "HEAD:refs/heads/release-$(printf '%s' "$REF_NAME" | sed -e 's/^v//' -e 's/[.][^.]*$//')"
  release-tag:
    if: (startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.ref_name, 'v'))
    needs:
      - nix
    permissions:
      contents: write
    runs-on: ubuntu-slim
    steps:
      - continue-on-error: true
        id: createGithubAppToken
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.OPERATOR_APP_CLIENT_ID }}
          permission-contents: write
          private-key: ${{ secrets.OPERATOR_PRIVATE_KEY }}
      - uses: shikanime-studio/actions/checkout@v9
        with:
          github-token: ${{ steps.createGithubAppToken.outputs.token || secrets.GITHUB_TOKEN }}
      - env:
          GITHUB_TOKEN: ${{ steps.createGithubAppToken.outputs.token || secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name || github.event.inputs.ref_name }}
          REPO: ${{ github.repository }}
        run: gh release create "$REF_NAME" --repo "$REPO" --generate-notes || true
name: Release
'on':
  push:
    branches:
      - main
      - release-[0-9]+.[0-9]+
    tags:
      - v?[0-9]+.[0-9]+.[0-9]+*
  workflow_call:
    secrets:
      CACHIX_AUTH_TOKEN:
        required: true
      OPERATOR_PRIVATE_KEY:
        required: true
  workflow_dispatch:
    inputs:
      ref_name:
        description: Tag or branch to release
        required: true
permissions:
  contents: read
