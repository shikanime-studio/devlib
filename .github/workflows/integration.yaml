jobs:
  nix:
    secrets:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
      OPERATOR_PRIVATE_KEY: ${{ secrets.OPERATOR_PRIVATE_KEY }}
    uses: shikanime-studio/devlib/workflows/nix.yaml@main
    with:
      app-id: ${{ vars.OPERATOR_APP_ID }}
      cachix-name: shikanime-studio
name: Integration
'on':
  pull_request:
    branches:
      - main
      - gh/*/*/base
permissions:
  contents: read
